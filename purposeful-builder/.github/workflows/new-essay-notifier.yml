name: Automate Buttondown Draft

on:
  push:
    branches:
      - main
    paths:
      - 'content/essays/**.mdx'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get added files
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files: content/essays/**.mdx

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Create Buttondown Draft
        if: steps.changed-files.outputs.added_files != ''
        env:
          BUTTONDOWN_API_KEY: ${{ secrets.BUTTONDOWN_API_KEY }}
        run: node scripts/notify-subscribers.mjs ${{ steps.changed-files.outputs.added_files }}
